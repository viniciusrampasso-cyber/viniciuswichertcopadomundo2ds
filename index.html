<title>Copas do Mundo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#101010;
}

/* BARRA LATERAL */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    overflow-y:auto;
    background:#151515;
    padding:15px;
}

/* CARD DOS ANOS */

.copa{
    width:100%;
    height:90px;

    margin-bottom:12px;

    border-radius:12px;

    background-size:cover;
    background-position:center;

    position:relative;

    cursor:pointer;

    overflow:hidden;

    transition:
        transform .3s ease,
        box-shadow .3s ease,
        filter .3s ease;
}

/* CAMADA ESCURA */

.copa::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
}

/* TEXTO */

.copa span{
    position:absolute;
    left:15px;
    bottom:15px;

    z-index:2;

    color:white;
    font-size:24px;
    font-weight:bold;
}

/* ANIMAÇÃO HOVER */

.copa:hover{
    transform:scale(1.05);

    filter:brightness(1.15);

    box-shadow:
        0 0 15px rgba(255,255,255,.3),
        0 0 30px rgba(255,255,255,.2);
}

/* ANIMAÇÃO CLICK */

.copa:active{
    transform:scale(.95);
}

/* CARD SELECIONADO */

.copa.selecionado{
    border:3px solid gold;

    box-shadow:
        0 0 20px gold,
        0 0 40px rgba(255,215,0,.5);
}

</style>
</head>

cards.forEach(card => {

    card.addEventListener("click", () => {
