.logo:hover{

.logo:active{
    transform:scale(.95);
}

</head>

/* BARRA LATERAL */

.sidebar{
    position:fixed;

    top:65px;
    left:0;

    width:220px;
    height:calc(100vh - 65px);

    background:#151515;

    padding:10px;

    display:flex;
    flex-direction:column;
    gap:6px;
}

/* ANOS DAS COPAS */

.copa{
    height:32px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:8px;

    background:#202020;

    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:
        transform .25s ease,
        color .25s ease,
        box-shadow .25s ease;
}

.copa:hover{
    color:gold;

    transform:scale(1.05);

    box-shadow:
        0 0 10px gold;
}

.copa:active{
    transform:scale(.95);
}

.copa.selecionado{
    color:gold;

    border:2px solid gold;

    box-shadow:
        0 0 15px gold;
}

</style>

<script>

const cards = document.querySelectorAll(".copa");

cards.forEach(card => {

    card.addEventListener("click", () => {

        cards.forEach(c =>
            c.classList.remove("selecionado")
        );

        card.classList.add("selecionado");

    });

});

</script>
