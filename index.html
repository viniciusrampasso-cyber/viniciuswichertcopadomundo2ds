<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copas do Mundo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    height:100vh;
}

.sidebar{
    width:220px;
    background:#1e1e1e;
    color:white;
    overflow-y:auto;
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:20px;
}

.sidebar button{
    width:100%;
    padding:10px;
    margin-bottom:8px;
    border:none;
    background:#333;
    color:white;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

.sidebar button:hover{
    background:#555;
}

.content{
    flex:1;
    padding:30px;
    background:#f4f4f4;
}

.content h1{
    margin-bottom:15px;
}

.content p{
    font-size:18px;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Copas</h2>

    <button onclick="mostrarCopa('1930')">1930</button>
    <button onclick="mostrarCopa('1934')">1934</button>
    <button onclick="mostrarCopa('1938')">1938</button>
    <button onclick="mostrarCopa('1950')">1950</button>
    <button onclick="mostrarCopa('1954')">1954</button>
    <button onclick="mostrarCopa('1958')">1958</button>
    <button onclick="mostrarCopa('1962')">1962</button>
    <button onclick="mostrarCopa('1966')">1966</button>
    <button onclick="mostrarCopa('1970')">1970</button>
    <button onclick="mostrarCopa('1974')">1974</button>
    <button onclick="mostrarCopa('1978')">1978</button>
    <button onclick="mostrarCopa('1982')">1982</button>
    <button onclick="mostrarCopa('1986')">1986</button>
    <button onclick="mostrarCopa('1990')">1990</button>
    <button onclick="mostrarCopa('1994')">1994</button>
    <button onclick="mostrarCopa('1998')">1998</button>
    <button onclick="mostrarCopa('2002')">2002</button>
    <button onclick="mostrarCopa('2006')">2006</button>
    <button onclick="mostrarCopa('2010')">2010</button>
    <button onclick="mostrarCopa('2014')">2014</button>
    <button onclick="mostrarCopa('2018')">2018</button>
    <button onclick="mostrarCopa('2022')">2022</button>
</div>

<div class="content">
    <h1 id="titulo">Copas do Mundo</h1>
    <p id="texto">Clique em um ano no menu lateral.</p>
</div>

<script>
const copas = {
    "1930": "Primeira Copa do Mundo. Campeão: Uruguai.",
    "1934": "Realizada na Itália. Campeão: Itália.",
    "1938": "Realizada na França. Campeão: Itália.",
    "1950": "Realizada no Brasil. Campeão: Uruguai.",
    "1954": "Realizada na Suíça. Campeão: Alemanha Ocidental.",
    "1958": "Realizada na Suécia. Campeão: Brasil.",
    "1962": "Realizada no Chile. Campeão: Brasil.",
    "1966": "Realizada na Inglaterra. Campeão: Inglaterra.",
    "1970": "Realizada no México. Campeão: Brasil.",
    "1974": "Realizada na Alemanha Ocidental. Campeão: Alemanha Ocidental.",
    "1978": "Realizada na Argentina. Campeão: Argentina.",
    "1982": "Realizada na Espanha. Campeão: Itália.",
    "1986": "Realizada no México. Campeão: Argentina.",
    "1990": "Realizada na Itália. Campeão: Alemanha Ocidental.",
    "1994": "Realizada nos EUA. Campeão: Brasil.",
    "1998": "Realizada na França. Campeão: França.",
    "2002": "Realizada na Coreia do Sul/Japão. Campeão: Brasil.",
    "2006": "Realizada na Alemanha. Campeão: Itália.",
    "2010": "Realizada na África do Sul. Campeão: Espanha.",
    "2014": "Realizada no Brasil. Campeão: Alemanha.",
    "2018": "Realizada na Rússia. Campeão: França.",
    "2022": "Realizada no Catar. Campeão: Argentina."
};

function mostrarCopa(ano){
    document.getElementById("titulo").innerText = "Copa do Mundo " + ano;
    document.getElementById("texto").innerText = copas[ano];
}
</script>

</body>
</html>
